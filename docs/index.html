<html lang="zh-Hant">
<head>
<meta charset="utf-8">

<meta name="description" content="台股上市櫃注意股與處置股查詢:處置月曆、出關倒數、分盤限制、注意累計次數與處置風險試算。資料來源 TWSE/TPEx 公開 OpenAPI。">
<style>
:root{
  --bg:#f6f7f9; --surface:#ffffff; --ink:#191a1f; --ink2:#585a66; --ink3:#8b8d99;
  --line:#e3e5ea; --accent:#2563eb; --accent-bg:#eaf0fd;
  --good:#1a7f37; --good-bg:#e6f4ea;
  --warn:#9a6700; --warn-bg:#fff4d5;
  --serious:#bc4c00; --serious-bg:#ffe8d7;
  --critical:#c0362c; --critical-bg:#fdebe9;
  --chip5:#0969da; --chip5-bg:#ddf4ff;
  --chip20:#bc4c00; --chip20-bg:#ffe8d7;
}
@media (prefers-color-scheme: dark){
  :root{
    --bg:#121317; --surface:#1c1d23; --ink:#ebecf1; --ink2:#a4a6b3; --ink3:#767884;
    --line:#2d2e36; --accent:#7ca7f7; --accent-bg:#1d2839;
    --good:#57ab5a; --good-bg:#122117;
    --warn:#c69026; --warn-bg:#2a2214;
    --serious:#e0823d; --serious-bg:#2b1d12;
    --critical:#e5534b; --critical-bg:#2d1615;
    --chip5:#6cb6ff; --chip5-bg:#122a41;
    --chip20:#e0823d; --chip20-bg:#2b1d12;
  }
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--ink);
  font-family:"Segoe UI","Microsoft JhengHei","PingFang TC",system-ui,sans-serif;
  font-size:15px;line-height:1.6}
.wrap{max-width:1060px;margin:0 auto;padding:18px 14px 70px}
header{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap}
h1{font-size:1.3rem;font-weight:700}
#updated{color:var(--ink3);font-size:.8rem}
.disclaimer{color:var(--ink3);font-size:.78rem;margin:4px 0 14px}
.tiles{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:18px}
.tile{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:12px 15px}
.tile .n{font-size:1.6rem;font-weight:700;font-variant-numeric:tabular-nums}
.tile .t{color:var(--ink2);font-size:.8rem}
nav.tabs{display:flex;gap:2px;border-bottom:1px solid var(--line);margin-bottom:16px;flex-wrap:wrap;position:sticky;top:0;background:var(--bg);z-index:5;padding-top:4px}
nav.tabs button{border:none;background:none;color:var(--ink2);padding:9px 14px;cursor:pointer;font-size:.93rem;border-bottom:2px solid transparent;white-space:nowrap}
nav.tabs button.on{color:var(--ink);border-bottom-color:var(--accent);font-weight:650}
section{display:none}section.on{display:block}
.card{background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:15px 17px;margin-bottom:12px}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 10px;font-size:.76rem;font-weight:650;white-space:nowrap}
.b-critical{background:var(--critical-bg);color:var(--critical)}
.b-serious{background:var(--serious-bg);color:var(--serious)}
.b-warn{background:var(--warn-bg);color:var(--warn)}
.b-good{background:var(--good-bg);color:var(--good)}
.b-5{background:var(--chip5-bg);color:var(--chip5)}
.b-20{background:var(--chip20-bg);color:var(--chip20)}

/* 月曆 */
.calhead{display:flex;align-items:center;gap:10px;margin-bottom:10px;flex-wrap:wrap}
.calhead h2{font-size:1.05rem}
.calhead button{border:1px solid var(--line);background:var(--surface);color:var(--ink2);border-radius:8px;padding:4px 12px;cursor:pointer}
.calhead .sum{color:var(--ink2);font-size:.82rem;margin-left:auto}
.calgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.calgrid .dow{color:var(--ink3);font-size:.75rem;text-align:center;padding:4px 0}
.day{background:var(--surface);border:1px solid var(--line);border-radius:8px;height:118px;padding:4px 6px;font-size:.78rem;overflow-y:auto;scrollbar-width:thin}
.day.dim{opacity:.38}
.day.today{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent) inset}
.day .dn{color:var(--ink3);font-size:.72rem}
.day .chip{display:block;margin-top:2px;border-radius:5px;padding:1px 5px;cursor:pointer;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:.74rem}
.chip.c5{background:var(--chip5-bg);color:var(--chip5)}
.chip.c20{background:var(--chip20-bg);color:var(--chip20)}
/* 篩選列 */

.filters button{border:1px solid var(--line);background:var(--surface);color:var(--ink2);border-radius:999px;padding:4px 13px;cursor:pointer;font-size:.83rem}

.dcard details{margin-top:6px}
.dcard summary{color:var(--accent);font-size:.8rem;cursor:pointer}
.dcard .full{color:var(--ink2);font-size:.82rem;margin-top:6px;overflow-wrap:anywhere}
/* 注意股表 */
table{width:100%;border-collapse:collapse}
th{color:var(--ink3);font-size:.76rem;font-weight:600;text-align:left;padding:8px 9px;border-bottom:1px solid var(--line);white-space:nowrap}

tr.rowlink:hover td{background:color-mix(in srgb,var(--accent) 6%,transparent)}

.crit-text{color:var(--ink2);font-size:.84rem}
.bufline{display:flex;align-items:center;gap:8px;margin:4px 0;font-size:.85rem;color:var(--ink2)}
.bufbar{height:8px;border-radius:4px;background:var(--line);flex:0 0 150px;overflow:hidden}
.bufbar i{display:block;height:100%;border-radius:4px}
.searchbar{display:flex;gap:8px;margin-bottom:14px}
.searchbar input{flex:0 1 250px;background:var(--surface);border:1px solid var(--line);color:var(--ink);border-radius:8px;padding:8px 12px;font-size:.95rem}
.searchbar button{border:1px solid var(--accent);background:var(--accent);color:#fff;border-radius:8px;padding:8px 18px;cursor:pointer}
.kv{margin:5px 0 0;color:var(--ink2);font-size:.88rem}
.kv b{color:var(--ink)}
.empty{color:var(--ink3);padding:22px;text-align:center}
h2{font-size:1.02rem;font-weight:650;margin-bottom:10px}
h3{font-size:.92rem;font-weight:650;margin:13px 0 5px}
.rules p,.rules li{color:var(--ink2);font-size:.89rem;margin-bottom:5px}

.rules ul{padding-left:20px}

footer{color:var(--ink3);font-size:.76rem;margin-top:30px;text-align:center}
/* 個股時間軸 */
.tags{color:var(--warn);font-size:.85rem;font-weight:650}
.tl{position:relative;margin-top:10px}
.tl-row{display:grid;grid-template-columns:108px 1fr;gap:14px;position:relative;padding-bottom:14px}
.tl-row::before{content:'';position:absolute;left:96px;top:8px;bottom:-6px;width:2px;background:var(--line)}
.tl-row:last-child::before{bottom:auto;height:14px}
.tl-row::after{content:'';position:absolute;left:91.5px;top:6px;width:11px;height:11px;border-radius:50%;background:var(--warn);border:2px solid var(--surface)}
.tl-date{font-weight:650;font-size:.9rem;text-align:right;padding-right:22px;padding-top:1px;white-space:nowrap}
.tl-card{background:var(--bg);border:1px solid var(--line);border-radius:10px;padding:11px 14px}
.tl-card .crit-text{margin-top:5px}
.mini{font-size:.8rem;color:var(--ink2);border-collapse:collapse;margin-top:6px}
.mini td,.mini th{padding:3px 9px;border-bottom:1px solid var(--line)}
.anal{background:var(--accent-bg);border-radius:10px;padding:12px 15px;margin-top:10px}
.anal p{margin:3px 0;font-size:.9rem;color:var(--ink2)}
.anal b{color:var(--ink)}
.anal .hl{color:var(--critical);font-weight:700}
@media (max-width:640px){ .tl-row{grid-template-columns:86px 1fr} .tl-row::before{left:76px} .tl-row::after{left:71.5px} .tl-date{padding-right:20px;font-size:.8rem} }
@media (max-width:640px){ .bufbar{flex-basis:100px} .day{min-height:58px} }
</style>

<script>
let D=null, H=null, calYM=null;
const $=s=>document.querySelector(s);
const esc=s=>(s||'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));
const todayISO=()=>new Date().toISOString().slice(0,10);

function fmtMD(iso){return iso?(+iso.slice(5,7))+'/'+(+iso.slice(8,10)):'';}
function localISO(){const t=new Date();return t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');}
function nd(i){
  // next_days[0]=資料的下一交易日。盤前/盤中打開(==今天)→「今日」;
  // 收盤後(==日曆明天)→「明日」;跨週末 →「下一交易日」。
  const dd=(typeof D!=='undefined'&&D&&D.next_days)?D.next_days:null;
  if(!dd) return ['今日','明日','後日'][i];
  const t=new Date(); const tISO=localISO();
  t.setDate(t.getDate()+1);
  const tmISO=t.getFullYear()+'-'+String(t.getMonth()+1).padStart(2,'0')+'-'+String(t.getDate()).padStart(2,'0');
  let words;
  if(dd[0]===tISO) words=['今日','明日','後日'];
  else if(dd[0]===tmISO) words=['明日','後日','大後日'];
  else words=['下一交易日','次二日','次三日'];
  return words[i]+'('+fmtMD(dd[i])+')';
}
function riskBadge(m){
  if(m===null||m===undefined) return '<span class="badge b-good">🟢 不計數(第9款+)</span>';
  if(m<=0) return '<span class="badge b-critical">⛔ 已達門檻</span>';
  if(m===1) return '<span class="badge b-critical">🔴 再 1 次即處置</span>';
  if(m===2) return '<span class="badge b-serious">🟠 再 2 次即處置</span>';
  if(m===3) return '<span class="badge b-warn">🟡 再 3 次即處置</span>';
  return '<span class="badge b-good">🟢 觀察中(差 '+m+' 次)</span>';
}
function intervalBadge(iv){
  if(iv==null) return '';
  return iv<=5 ? '<span class="badge b-5">'+iv+' 分盤</span>'
               : '<span class="badge b-20">'+iv+' 分盤</span>';
}
function pend(d){return d.period_end_real||d.period_end;}
function countdown(d){
  const t=todayISO();
  const pe=pend(d);
  if(!pe) return '';
  if(d.period_start && t<d.period_start) return '<span class="badge b-warn">⏳ '+d.period_start.slice(5).replace('-','/')+' 開始</span>';
  const ex=d.exit_date;
  if(ex ? t>=ex : t>pe) return '<span class="badge b-good">✅ 已出關</span>';
  const days=Math.round((new Date(pe)-new Date(t))/864e5)+1;
  return '<span class="badge '+(days<=3?'b-good':'b-serious')+'">🔓 '+(ex?(fmtMD(ex)+' 出關'):('出關倒數約 '+days+' 天'))+'</span>';
}

/* ---------- 月曆(資料=一年歷史庫+當日快照) ---------- */
let CAL=[];
function buildCalEvents(){
  CAL=[]; const seen={};
  for(const d of D.dispositions){
    if(!d.anndate) continue;
    seen[d.code+'|'+d.anndate]=1;
    CAL.push({a:d.anndate,c:d.code,n:d.name,iv:d.interval});
  }
  for(const c in H){
    if(c==='_meta') continue;
    const dp=H[c].dispositions||{};
    for(const k in dp){
      const v=dp[k]; const a=v.anndate||v.period_start;
      if(!a||seen[c+'|'+a]) continue;
      seen[c+'|'+a]=1;
      CAL.push({a,c,n:H[c].name||'',iv:v.interval});
    }
  }
}
function renderCal(){
  const [y,m]=calYM;
  $('#cal-title').textContent=y+' 年 '+m+' 月';
  const byDay={}; let n5=0,n20=0;
  for(const d of CAL){
    const dtp=d.a.split('-');
    if(+dtp[0]===y && +dtp[1]===m){
      (byDay[+dtp[2]]=byDay[+dtp[2]]||[]).push(d);
      if((d.iv||5)<=5) n5++; else n20++;
    }
  }
  $('#cal-sum').textContent='本月公告:5分盤 '+n5+' 檔｜20分盤+ '+n20+' 檔';
  const first=new Date(y,m-1,1), startDow=first.getDay(), dim=new Date(y,m,0).getDate();
  let h=['日','一','二','三','四','五','六'].map(x=>'<div class="dow">'+x+'</div>').join('');
  for(let i=0;i<startDow;i++) h+='<div class="day dim"></div>';
  const tISO=todayISO();
  for(let day=1;day<=dim;day++){
    const iso=y+'-'+String(m).padStart(2,'0')+'-'+String(day).padStart(2,'0');
    h+='<div class="day'+(iso===tISO?' today':'')+'"><div class="dn">'+day+'</div>';
    for(const d of (byDay[day]||[])){
      h+='<span class="chip '+((d.iv||5)<=5?'c5':'c20')+'" onclick="openStock(\''+d.c+'\')">'+esc(d.n)+'－'+esc(d.c)+'</span>';
    }
    h+='</div>';
  }
  // 固定 6 週 42 格,每月同尺寸;格內超出改捲動
  for(let i=startDow+dim;i<42;i++) h+='<div class="day dim"></div>';
  $('#calgrid').innerHTML=h;
}
function shiftCal(dm){
  let [y,m]=calYM; m+=dm;
  if(m<1){m=12;y--;} if(m>12){m=1;y++;}
  calYM=[y,m]; renderCal();
}
function jumpCard(code,ann){
  switchTab('dis');
  disFilter='all'; $('#dis-q').value=code; renderDis();
  setTimeout(()=>{const el=document.getElementById('dc-'+code+'-'+ann); if(el) el.scrollIntoView({behavior:'smooth',block:'center'});},60);
}

/* ---------- 處置公告 ---------- */
let disFilter='all';
function renderDis(){
  const q=($('#dis-q').value||'').trim().toLowerCase();
  const t=todayISO();
  let list=D.dispositions.filter(d=>{
    if(disFilter==='5'&&(d.interval||5)>5) return false;
    if(disFilter==='20'&&(d.interval||5)<=5) return false;
    if(disFilter==='active'&&!(d.period_start<=t&&t<=d.period_end)) return false;
    if((disFilter==='上市'||disFilter==='上櫃')&&d.market!==disFilter) return false;
    if(q&&!(d.code.toLowerCase().includes(q)||d.name.toLowerCase().includes(q))) return false;
    return true;
  });
  if(!list.length){$('#dis-list').innerHTML='<div class="card empty">沒有符合的處置公告</div>';return;}
  let h='',lastDate='';
  for(const d of list){
    if(d.anndate!==lastDate){lastDate=d.anndate;h+='<div class="datehdr">📅 '+esc(d.anndate||'(日期不明)')+' 公告</div>';}

function renderExit(){

/* ---------- 注意股 ---------- */
function clauseChips(a){
  if(!a.trig||!a.trig.clauses||!a.trig.clauses.length) return '<span class="crit-text">–</span>';
  return a.trig.clauses.map(c=>'<span class="badge b-mkt" title="'+esc(a.trig.info)+'">第'+c+'款</span>').join(' ');
}
function zjProb(a){
  // 一年實證(5,041注意日):連3+未公告52%、連2 40%、連1 19%;近30日已公告 4~10%
  if(a.zjr) return '<span class="badge b-good">低 ~4-10%(近30日已公告)</span>';
  if((a.zjs||0)>=3) return '<span class="badge b-critical">約 52%(連'+a.zjs+'日)</span>';
  if(a.zjs===2) return '<span class="badge b-serious">約 40%(連2日)</span>';
  return '<span class="badge b-warn">約 19%(首日)</span>';
}
function condStr(a,forDaily){
  const an=a.analysis;
  if(!an) return forDaily?'再中 1 次注意即處置':'–';
  if(an.certain_hit) return '<b style="color:var(--critical)">一定中注意(漲跌停都閃不過6日累積門檻)</b>';
  const cs=[];
  const L=an.limit+0.05;
  const vmin=Math.min(an.crit_vol||Infinity, an.vol4||Infinity);
  const which=(an.vol4&&vmin===an.vol4)?'週轉率'+an.to_th+'%':'60日均量×5';
  const vtxt=vmin<Infinity?'量 <b>'+vmin.toLocaleString()+'</b> 張<span class="crit-text">('+which+')</span>':null;
  if(!an.exempt1_lowprice){
    // 漲方向:第一款
    if(an.crit_pct<=L) cs.push('收盤 <b>'+an.crit_tick+'</b> 以上');
    // 漲方向:三/四款組合(僅在比第一款便宜時才有意義)
    if(vtxt&&an.crit34_pct<=L&&an.crit34_tick<an.crit_tick){
      cs.push(an.crit34_pct<=0.3?vtxt:('收盤 '+an.crit34_tick+' 以上且'+vtxt));
    }
    // 第二款(30/60日起迄漲幅)
    if(an.crit2_pct!==null&&an.crit2_pct!==undefined&&an.crit2_pct<=L&&(!cs.length||an.crit2_tick<an.crit_tick)){
      cs.push('收盤 <b>'+an.crit2_tick+'</b> 以上<span class="crit-text">(第二款)</span>');
    }
    // 跌方向:第一款
    if(an.crit_dn_pct>=-L) cs.push('收盤 <b>'+an.crit_dn_tick+'</b> 以下<span class="crit-text">(跌)</span>');
    // 跌方向:三/四款組合
    if(vtxt&&an.crit34_dn_pct>=-L&&an.crit34_dn_tick>an.crit_dn_tick){
      cs.push(an.crit34_dn_pct>=-0.3?vtxt:('收盤 '+an.crit34_dn_tick+' 以下(跌)且'+vtxt));
    }
  }
  if(!cs.length) return '🚫 價量'+nd(0)+'皆難達(券商比等其他款仍可能)';
  return cs.join(' 或 ');
}
function renderAtt(){
  if(!D.attention.length){$('#att-list').innerHTML='<div class="card empty">目前沒有注意股 🎉</div>';return;}
  let h='<div class="card"><table><thead><tr><th>代號</th><th>名稱</th><th>市場</th><th>處置風險</th><th>今日觸發款別</th><th>'+nd(0)+'觸發條件</th><th>注意紀錄</th></tr></thead><tbody>';

/* ---------- 個股查詢 ---------- */
function bufHtml(buffers,minDays){
  const denom={'連續3次(第一款,最快)':3,'連續5次(綜合)':5,'最近10日內6次':6,'最近30日內12次':12};
  let h='';
  for(const k in buffers){
    const left=buffers[k],total=denom[k]||5,done=Math.max(0,total-left);
    const pct=Math.min(100,Math.round(done/total*100));
    const col=left<=1?'var(--critical)':(left<=2?'var(--serious)':'var(--warn)');
    h+='<div class="bufline"><span class="bufbar"><i style="width:'+pct+'%;background:'+col+'"></i></span>'
      +esc(k)+':已 '+done+'/'+total+',還差 <b>'+left+'</b> 次'+(left===minDays?' ← 最快':'')+'</div>';
  }
  return h;
}
function findStock(q){
  q=q.trim().toLowerCase(); if(!q) return null;
  let code=null,name='',market='';
  const S=D.stocks||{};
  if(S[q]){code=q;}
  else{
    for(const c in S){if((S[c][0]||'').toLowerCase()===q){code=c;break;}}
    if(!code){for(const c in S){if((S[c][0]||'').toLowerCase().includes(q)){code=c;break;}}}
  }
  if(!code){
    if(/^\d{4,6}$/.test(q)&&H[q])code=q;
    else{for(const c in H){if((H[c].name||'').toLowerCase().includes(q)){code=c;break;}}}
  }
  if(!code) return null;
  if(S[code]){name=S[code][0];market=S[code][1];}
  else if(H[code])name=H[code].name||'';
  const att=D.attention.find(a=>a.code===code)||null;
  const dis=D.dispositions.filter(d=>d.code===code);
  if(att&&!name)name=att.name;
  return {code,name,market,att,dis,hist:H[code]||null};
}
function openStock(q){
  switchTab('stock'); $('#q').value=q; renderStock(findStock(q),q);
}

      const kind=isO&&e.k==='forced'?'<span class="badge b-serious">達注意標準</span>':'<span class="badge b-mkt">自結</span>';
      let body=isO?(finHtml(e.f)+'<span class="crit-text">'+esc(e.s)+'</span>'):esc(String(e||''));
      h+='<tr><td class="crit-text" style="white-space:nowrap">'+esc(d)+'</td><td>'+kind+'</td><td class="crit-text">'+body+'</td></tr>';
    }
    h+='</tbody></table>';
  }else{
    h+='<p class="kv">尚無自結公告紀錄(每日自動從重大訊息累積;歷史自啟用日起算)。</p>';
  }
  h+='</div>';

  h+='<div class="card"><h2>歷史紀錄</h2>';
  if(!s.hist){h+='<p class="kv">本站資料庫尚無此檔歷史(自動更新啟用後會逐日累積)。</p>';}
  else{
    const evKeys=Object.keys(s.hist.dispositions||{});
    if(evKeys.length){
      h+='<h3>處置事件</h3><table><thead><tr><th>期間</th><th>分盤</th><th>原因</th></tr></thead><tbody>';
      for(const k of evKeys){
        const e=s.hist.dispositions[k];
        h+='<tr><td class="crit-text">'+esc(e.period_start||'')+' ~ '+esc(e.period_end||k)+'</td>'
          +'<td>'+intervalBadge(e.interval)+'</td><td class="crit-text">'+esc(e.reason)+'</td></tr>';
      }
      h+='</tbody></table>';
    }else h+='<p class="kv">處置事件:無</p>';
  }
  h+='</div>';

  // 注意公告時間軸
  const days=s.hist?Object.keys(s.hist.attention||{}).sort().reverse():[];
  h+='<div class="card"><h2>注意公告時間軸</h2>';
  if(days.length){
    h+='<p class="kv">累計 <b>'+days.length+'</b> 次注意公告 <span class="crit-text">最近公告日 '+esc(days[0].replace(/-/g,'/'))+'</span></p><div class="tl">';
    for(const d of days.slice(0,40)){
      const e=s.hist.attention[d];
      const isObj=e&&typeof e==='object';
      const txt=isObj?(e.trig||e.cum||''):String(e||'');
      const cl=isObj&&e.clauses&&e.clauses.length?e.clauses.map(c=>'第'+c+'款').join('、'):'';
      const tg=tagsFromText(txt);
      h+='<div class="tl-row"><div class="tl-date">'+esc(d.replace(/-/g,'/'))+'</div><div class="tl-card">'
        +'<div class="row1"><span class="nm">'+esc(s.name||'')+'</span><span class="cd">'+esc(s.code)+'</span>'
        +(tg.length?'<span class="tags">'+tg.join('｜')+'</span>':'')
        +(cl?'<span class="badge b-mkt" style="margin-left:auto">'+esc(cl)+'</span>':'')
        +(isObj&&e.close?'<span class="crit-text">收盤 '+esc(e.close)+'</span>':'')
        +'</div>'
        +(txt?'<div class="crit-text">'+esc(txt)+'</div>':'')
        +'</div></div>';
    }
    h+='</div>';
    if(days.length>40)h+='<p class="disclaimer">僅顯示最近 40 筆。</p>';
  }else{
    h+='<p class="kv">近 45 天內無注意公告紀錄。</p>';
  }
  h+='</div>';
  $('#stock-result').innerHTML=h;
}
function finHtml(f){
  if(!f||!f.length) return '';
  let h='<div style="margin:5px 0 3px">';
  for(const x of f){
    if(typeof x==='string'){h+='<div class="tags">'+esc(x)+'</div>';continue;}
    h+='<div style="font-size:.95rem;margin:2px 0"><b>'+esc(x.l)+' EPS '+esc(x.eps)+' 元</b>';
    if(x.yoy!==null&&x.yoy!==undefined&&x.yoy!==''){
      const v=parseFloat(x.yoy);
      h+=isNaN(v)
        ?' <span style="font-weight:650;color:var(--warn)">'+esc(x.yoy)+'</span>'
        :' <span style="font-weight:650;color:'+(v>=0?'var(--critical)':'var(--good)')+'">YoY '+(v>=0?'▲':'▼')+Math.abs(v).toLocaleString()+'%</span>';
    }
    h+='</div>';
  }
  return h+'</div>';
}
function tagsFromText(t){
  const map=[['漲跌幅',/漲幅|跌幅/],['價差',/價差/],['成交量',/成交量/],['周轉率',/週轉率/],
             ['券商比',/券商/],['本益比',/本益比|淨值比/],['當沖',/當日沖銷|當沖/],['券資比',/券資/]];
  return map.filter(m=>m[1].test(t||'')).map(m=>m[0]);
}

async function decryptB64(b64,pw){
  const raw=Uint8Array.from(atob(b64.trim()),c=>c.charCodeAt(0));
  const salt=raw.slice(0,16),iv=raw.slice(16,28),ct=raw.slice(28);
  const km=await crypto.subtle.importKey('raw',new TextEncoder().encode(pw),'PBKDF2',false,['deriveKey']);
  const key=await crypto.subtle.deriveKey({name:'PBKDF2',salt,iterations:250000,hash:'SHA-256'},km,{name:'AES-GCM',length:256},false,['decrypt']);
  const pt=await crypto.subtle.decrypt({name:'AES-GCM',iv},key,ct);
  return JSON.parse(new TextDecoder().decode(pt));
}
async function loadJSON(name,pw){
  const bust='?t='+Date.now();
  const r=await fetch(name+'.enc'+bust);
  if(r.ok){
    const b64=await r.text();
    if(b64.length>50&&b64.indexOf('<')<0) return decryptB64(b64,pw);
  }
  const r2=await fetch(name+bust);
  if(!r2.ok) throw new Error('no data');
  return r2.json();
}

function showTile(kind){

  const exsrc=(D.exits&&D.exits.length)?D.exits:D.dispositions;
  const act=exsrc.filter(x=>x.period_start<=t&&(x.exit_date?t<x.exit_date:t<=pend(x)));

  if(kind==='att'){title='注意股';rows=D.attention.map(a=>[a.code,a.name,riskBadge(a.min_days)]);}
  else if(kind==='crit'){title='再 1 次注意即處置';rows=D.attention.filter(a=>a.min_days!==null&&a.min_days<=1).map(a=>[a.code,a.name,riskBadge(a.min_days)]);}
